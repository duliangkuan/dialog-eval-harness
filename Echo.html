      {actions && <div style={{ display: 'flex', gap: 10 }}>{actions}</div>}
    </div>

}

function Button({ children, variant = 'primary', size = 'md', onClick, style: extraStyle }) {
  const base = { border: 'none', cursor: 'pointer', fontFamily: 'inherit', fontWeight: 500, borderRadius: 'var(--radius-sm)', transition: 'all 0.15s ease', display: 'inline-flex', alignItems: 'center', gap: 6 };
  const sizes = { sm: { fontSize: 12, padding: '5px 12px' }, md: { fontSize: 13, padding: '8px 18px' }, lg: { fontSize: 14, padding: '10px 24px' } };
  const variants = {
    primary: { background: 'var(--accent)', color: '#fff' },
    secondary: { background: 'var(--bg-warm)', color: 'var(--ink)', border: '1px solid var(--border)' },
    ghost: { background: 'transparent', color: 'var(--accent)' },
    danger: { background: 'var(--error-light)', color: 'var(--error)' },
  };
  return <button style={{ ...base, ...sizes[size], ...variants[variant], ...extraStyle }} onClick={onClick}>{children}</button>;
}

function Badge({ children, type = 'default' }) {
  const colors = {
    default: { bg: 'var(--border-light)', color: 'var(--ink-muted)' },
    success: { bg: 'var(--success-light)', color: 'var(--success)' },
    error: { bg: 'var(--error-light)', color: 'var(--error)' },
    warning: { bg: 'var(--warning-light)', color: 'var(--warning)' },
    accent: { bg: 'var(--accent-light)', color: 'var(--accent-dark)' },
  };
  const c = colors[type] || colors.default;
  return <span style={{ display: 'inline-block', fontSize: 12, padding: '2px 10px', borderRadius: 'var(--radius-xs)', background: c.bg, color: c.color, fontWeight: 500 }}>{children}</span>;
}

function Card({ children, style: extraStyle, onClick }) {
  return (
    <div style={{ background: 'var(--bg-card)', borderRadius: 'var(--radius)', boxShadow: 'var(--shadow)', padding: 24, cursor: onClick ? 'pointer' : 'default', transition: 'box-shadow 0.2s ease', ...extraStyle }}

      onMouseEnter={e => { if (onClick) e.currentTarget.style.boxShadow = 'var(--shadow-lg)'; }}
      onMouseLeave={e => { if (onClick) e.currentTarget.style.boxShadow = 'var(--shadow)'; }}>
      {children}

  );
}

function StatCard({ label, value, sub, trend }) {

      <div style={{ fontSize: 12, color: 'var(--ink-muted)', marginBottom: 8, fontWeight: 500 }}>{label}</div>

    </Card>
  );
}

function Table({ columns, data, onRowClick }) {
  return (
    <div style={{ overflowX: 'auto' }}>
      <table style={{ width: '100%', borderCollapse: 'collapse' }}>
        <thead>
          <tr>
            {columns.map(col => (
              <th key={col.key} style={{ textAlign: col.align || 'left', padding: '12px 16px', fontSize: 12, fontWeight: 600, color: 'var(--ink-muted)', borderBottom: '2px solid var(--border)', whiteSpace: 'nowrap', letterSpacing: '0.02em' }}>
                {col.title}
              </th>
            ))}
          </tr>
        </thead>
        <tbody>
          {data.map((row, i) => (
            <tr key={i} style={{ cursor: onRowClick ? 'pointer' : 'default', transition: 'background 0.1s' }}
              onClick={() => onRowClick?.(row)}
              onMouseEnter={e => e.currentTarget.style.background = 'rgba(74,155,127,0.03)'}
              onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
              {columns.map(col => (
                <td key={col.key} style={{ padding: '14px 16px', borderBottom: '1px solid var(--border-light)', fontSize: 13, fontFamily: col.mono ? 'var(--font-mono)' : 'inherit', color: col.muted ? 'var(--ink-muted)' : 'var(--ink)', whiteSpace: 'nowrap' }}>
                  {col.render ? col.render(row[col.key], row) : row[col.key]}
                </td>
              ))}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function Modal({ title, open, onClose, width, children }) {

  return (
    <div style={{ position: 'fixed', inset: 0, zIndex: 1000, display: 'flex', alignItems: 'center', justifyContent: 'center' }} onClick={onClose}>
      <div style={{ position: 'absolute', inset: 0, background: 'rgba(45,45,45,0.3)', backdropFilter: 'blur(4px)' }} />
      <div style={{ position: 'relative', background: 'var(--bg-card)', borderRadius: 'var(--radius)', boxShadow: 'var(--shadow-lg)', width: width || 640, maxHeight: '85vh', overflow: 'auto', padding: 32 }} onClick={e => e.stopPropagation()}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24 }}>
          <h2 style={{ fontFamily: 'var(--font-display)', fontSize: 20, fontWeight: 600 }}>{title}</h2>
          <span style={{ cursor: 'pointer', fontSize: 20, color: 'var(--ink-muted)', lineHeight: 1 }} onClick={onClose}>×</span>
        </div>
        {children}
      </div>
    </div>
  );
}

// ─── Mini Chart (SVG bar) ────────────────────────────────────

function MiniBar({ values, height = 32, width = 120 }) {
  const max = Math.max(...values);
  const barW = (width - (values.length - 1) * 2) / values.length;
  return (
    <svg width={width} height={height} style={{ display: 'block' }}>
      {values.map((v, i) => {
        const h = (v / max) * height * 0.9;
        return <rect key={i} x={i * (barW + 2)} y={height - h} width={barW} height={h} rx={2} fill="var(--accent)" opacity={0.6 + (v / max) * 0.4} />;
      })}
    </svg>
  );
}

function MiniDonut({ value, size = 48, stroke = 5 }) {
  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const offset = circ * (1 - value);
  return (
    <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--border)" strokeWidth={stroke} />
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--accent)" strokeWidth={stroke}
        strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round" />
    </svg>
  );
}

function PageExperiments() {
  const [createModal, setCreateModal] = useState(false);

  // Progress bar component for "运行中"
  function StatusCell({ status, progress }) {
    if (status === '完成') {
      return (
        <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <circle cx="9" cy="9" r="8" fill="var(--success)" opacity="0.15" />
            <path d="M5.5 9.2L7.8 11.5L12.5 6.5" stroke="var(--success)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" fill="none" />
          </svg>
          <span style={{ fontSize: 12, color: 'var(--success)', fontWeight: 500 }}>完成</span>
        </span>
      );
    }
    if (status === '失败') {
      return (
        <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <circle cx="9" cy="9" r="8" fill="var(--ink-light)" opacity="0.2" />
            <path d="M5.5 9.2L7.8 11.5L12.5 6.5" stroke="var(--ink-light)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" fill="none" />
          </svg>
          <span style={{ fontSize: 12, color: 'var(--ink-light)', fontWeight: 500 }}>失败</span>
        </span>
      );
    }
    // 运行中 → 进度条
    return (
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, minWidth: 120 }}>
        <div style={{ flex: 1, height: 6, background: 'var(--border-light)', borderRadius: 3, overflow: 'hidden' }}>
          <div style={{ width: `${progress}%`, height: '100%', background: 'var(--accent)', borderRadius: 3, transition: 'width 0.5s ease' }} />
        </div>
        <span style={{ fontSize: 11, fontFamily: 'var(--font-mono)', color: 'var(--accent)', fontWeight: 500, whiteSpace: 'nowrap' }}>{progress}%</span>
      </div>
    );
  }

  // Tag list component (compact)
  function TagList({ items, max }) {
    const show = max ? items.slice(0, max) : items;
    const more = max && items.length > max ? items.length - max : 0;
    return (
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4 }}>
        {show.map((t, i) => (
          <span key={i} style={{ display: 'inline-block', fontSize: 11, padding: '2px 8px', borderRadius: 'var(--radius-xs)', background: 'var(--accent-light)', color: 'var(--accent-dark)', fontWeight: 500, whiteSpace: 'nowrap' }}>{t}</span>
        ))}
        {more > 0 && <span style={{ fontSize: 11, color: 'var(--ink-muted)', padding: '2px 4px' }}>+{more}</span>}
      </div>
    );
  }

  const columns = [
    { key: 'id', title: '任务 ID', mono: true, render: (v) => <span style={{ fontFamily: 'var(--font-mono)', fontSize: 12 }}>{v}</span> },
    { key: 'topic', title: '测试主题', render: (v) => <span style={{ fontWeight: 500 }}>{v}</span> },
    { key: 'testset', title: '测试集' },
    { key: 'intents', title: '选用意图', render: (v) => <TagList items={v} max={2} /> },
    { key: 'evaluators', title: '评估员', render: (v) => <TagList items={v} max={2} /> },
    { key: 'status', title: '状态', render: (v, row) => <StatusCell status={v} progress={row.progress} /> },
    { key: 'startedAt', title: '开始时间', muted: true, mono: true },
    { key: 'duration', title: '耗时', mono: true },
    { key: 'actions', title: '操作', render: (_, row) => (
      <div style={{ display: 'flex', gap: 12 }}>
        {row.status === '完成' && <Button variant="ghost" size="sm">查看结果</Button>}
        <Button variant="ghost" size="sm">重跑</Button>
      </div>
    )},
  ];
  return (
    <div>
      <PageHeader title="自动化评测" subtitle="批量运行模型对话测试，对比不同版本与模型的表现" actions={<Button onClick={() => setCreateModal(true)}>发起评测任务</Button>} />
      <Card style={{ padding: 0 }}>
        <div style={{ padding: '16px 24px', borderBottom: '1px solid var(--border-light)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <span style={{ fontSize: 13, color: 'var(--ink-muted)' }}>共 {EXPERIMENTS.length} 次实验</span>
          <div style={{ display: 'flex', gap: 8 }}>
            {['全部', '完成', '运行中', '失败'].map(f => (
              <span key={f} style={{ fontSize: 12, padding: '4px 12px', borderRadius: 'var(--radius-xs)', cursor: 'pointer', background: f === '全部' ? 'var(--accent-light)' : 'transparent', color: f === '全部' ? 'var(--accent-dark)' : 'var(--ink-muted)', fontWeight: f === '全部' ? 500 : 400 }}>{f}</span>
            ))}
          </div>
        </div>
        <Table columns={columns} data={EXPERIMENTS} />
      </Card>

      <Modal title="发起评测任务" open={createModal} onClose={() => setCreateModal(false)} width={560}>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
          <div style={{ padding: 16, background: 'var(--accent-light)', borderRadius: 'var(--radius-sm)', fontSize: 13, color: 'var(--accent-dark)', lineHeight: 1.6 }}>
            选择提示词版本、测试集、评估员和项目模型的组合，系统将自动批量模拟多轮对话并评估结果。
          </div>
          <div>
            <label style={{ display: 'block', fontSize: 13, fontWeight: 500, marginBottom: 6 }}>测试主题 <span style={{ color: 'var(--error)' }}>*</span></label>
            <input style={{ width: '100%', padding: '10px 14px', border: '1px solid var(--border)', borderRadius: 'var(--radius-sm)', fontSize: 14, fontFamily: 'inherit', outline: 'none' }} placeholder="如：意图识别全量回归" />
            <div style={{ fontSize: 11, color: 'var(--ink-muted)', marginTop: 4 }}>自定义本次评测的主题名称，方便后续追踪</div>
          </div>
          <div>

            <select style={{ width: '100%', padding: '10px 14px', border: '1px solid var(--border)', borderRadius: 'var(--radius-sm)', fontSize: 14, fontFamily: 'inherit', outline: 'none', background: 'var(--bg-card)' }}>

        <StatCard label="失败" value={totalFail.toLocaleString()} sub={`${((totalFail/total)*100).toFixed(1)}%`} trend="down" />

      <Card style={{ padding: 0 }}>

        </div>
        <Table columns={[

          { key: 'name', title: '意图名称', render: (v) => <span style={{ fontWeight: 500 }}>{v}</span> },
          { key: 'realCount', title: '真实数量', mono: true },
          { key: 'recall', title: '召回率', mono: true, render: (v) => {

          }},
          { key: 'predictCount', title: '预测数量', mono: true },
          { key: 'precision', title: '准确率', mono: true, render: (v) => {
            const pct = (v * 100).toFixed(1);
            return <span style={{ color: v >= 0.95 ? 'var(--success)' : v >= 0.8 ? 'var(--warning)' : 'var(--error)', fontWeight: 500 }}>{pct}%</span>;
          }},

// ─── Page: Visualization ─────────────────────────────────────

function PageVisualization() {
  const avgRecall = (EVAL_RESULTS.reduce((s, r) => s + r.recall, 0) / EVAL_RESULTS.length * 100).toFixed(1);
  const avgPrecision = (EVAL_RESULTS.reduce((s, r) => s + r.precision, 0) / EVAL_RESULTS.length * 100).toFixed(1);

  return (
    <div>
      <PageHeader title="结果可视化" subtitle="多维度展示评测数据，选择指标进行交叉对比分析" />

      <div style={{ display: 'flex', gap: 16, marginBottom: 24 }}>
        <StatCard label="平均召回率" value={`${avgRecall}%`} />
        <StatCard label="平均准确率" value={`${avgPrecision}%`} />
        <StatCard label="评估意图数" value={EVAL_RESULTS.length} />
        <StatCard label="总用例数" value="6,262" />
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20, marginBottom: 20 }}>
        <Card>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
            <span style={{ fontSize: 15, fontWeight: 600, fontFamily: 'var(--font-display)' }}>各意图召回率</span>
            <select style={{ border: '1px solid var(--border)', borderRadius: 'var(--radius-xs)', padding: '4px 10px', fontSize: 12, fontFamily: 'inherit', outline: 'none', background: 'var(--bg-card)' }}>
              <option>召回率</option>
              <option>准确率</option>
              <option>F1 分数</option>
            </select>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {EVAL_RESULTS.map(r => {
              const pct = (r.recall * 100);
              return (
                <div key={r.intentId} style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                  <div style={{ width: 80, fontSize: 12, color: 'var(--ink-muted)', textAlign: 'right', flexShrink: 0 }}>{r.name}</div>
                  <div style={{ flex: 1, height: 20, background: 'var(--border-light)', borderRadius: 4, overflow: 'hidden' }}>
                    <div style={{ width: `${pct}%`, height: '100%', background: pct >= 95 ? 'var(--accent)' : pct >= 80 ? 'var(--warning)' : 'var(--error)', borderRadius: 4, transition: 'width 0.5s ease' }} />
                  </div>
                  <div style={{ width: 48, fontSize: 12, fontFamily: 'var(--font-mono)', fontWeight: 500, textAlign: 'right', color: pct >= 95 ? 'var(--success)' : pct >= 80 ? 'var(--warning)' : 'var(--error)' }}>{pct.toFixed(1)}%</div>
                </div>
              );
            })}
          </div>
        </Card>

        <Card>
          <div style={{ fontSize: 15, fontWeight: 600, marginBottom: 20, fontFamily: 'var(--font-display)' }}>召回率 vs 准确率 散点分布</div>
          <svg viewBox="0 0 300 250" style={{ width: '100%' }}>
            {/* Grid lines */}
            {[0, 0.25, 0.5, 0.75, 1].map(v => (
              <Fragment key={v}>
                <line x1={40} y1={20 + (1-v)*200} x2={290} y2={20 + (1-v)*200} stroke="var(--border-light)" strokeWidth={1} />
                <text x={35} y={24 + (1-v)*200} fontSize={10} fill="var(--ink-light)" textAnchor="end" fontFamily="var(--font-mono)">{(v*100).toFixed(0)}%</text>
                <line x1={40 + v*250} y1={20} x2={40 + v*250} y2={220} stroke="var(--border-light)" strokeWidth={1} />
                <text x={40 + v*250} y={238} fontSize={10} fill="var(--ink-light)" textAnchor="middle" fontFamily="var(--font-mono)">{(v*100).toFixed(0)}%</text>
              </Fragment>
            ))}
            <text x={165} y={250} fontSize={11} fill="var(--ink-muted)" textAnchor="middle">准确率</text>
            <text x={12} y={120} fontSize={11} fill="var(--ink-muted)" textAnchor="middle" transform="rotate(-90, 12, 120)">召回率</text>
            {/* Data points */}
            {EVAL_RESULTS.map(r => {
              const x = 40 + r.precision * 250;
              const y = 20 + (1 - r.recall) * 200;
              const size = Math.max(4, Math.min(10, r.realCount / 200));
              return (
                <g key={r.intentId}>
                  <circle cx={x} cy={y} r={size} fill="var(--accent)" opacity={0.7} />
                  <title>{r.name}: 召回 {(r.recall*100).toFixed(1)}%, 准确 {(r.precision*100).toFixed(1)}%</title>
                </g>
              );
            })}
          </svg>
        </Card>
      </div>

      <Card>
        <div style={{ fontSize: 15, fontWeight: 600, marginBottom: 20, fontFamily: 'var(--font-display)' }}>评估员评分分布</div>
        <div style={{ display: 'flex', gap: 20 }}>
          {[
            { name: 'PII 泄露检测', pass: 6200, fail: 62, rate: 99.0 },
            { name: '毒性检测', pass: 6100, fail: 162, rate: 97.4 },
            { name: '对话连贯性', avg: 8.3, max: 10, min: 2 },
          ].map(ev => (
            <div key={ev.name} style={{ flex: 1, padding: 20, background: 'var(--bg-warm)', borderRadius: 'var(--radius-sm)' }}>
              <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 12 }}>{ev.name}</div>
              {ev.rate !== undefined ? (
                <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                  <MiniDonut value={ev.rate / 100} />
                  <div>
                    <div style={{ fontSize: 20, fontWeight: 700, fontFamily: 'var(--font-mono)' }}>{ev.rate}%</div>
                    <div style={{ fontSize: 11, color: 'var(--ink-muted)' }}>通过率</div>
                  </div>
                </div>
              ) : (
                <div>
                  <div style={{ fontSize: 20, fontWeight: 700, fontFamily: 'var(--font-mono)', color: 'var(--accent)' }}>{ev.avg}</div>
                  <div style={{ fontSize: 11, color: 'var(--ink-muted)', marginTop: 4 }}>平均分（{ev.min}-{ev.max} 区间）</div>
                </div>
              )}
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
}

        <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
          <div>
            <label style={{ display: 'block', fontSize: 13, fontWeight: 500, marginBottom: 6 }}>模型名称 <span style={{ color: 'var(--error)' }}>*</span></label>
            <input style={{ width: '100%', padding: '10px 14px', border: '1px solid var(--border)', borderRadius: 'var(--radius-sm)', fontSize: 14, fontFamily: 'inherit', outline: 'none' }} placeholder="如：GPT-4o" />
          </div>
          <div>
            <label style={{ display: 'block', fontSize: 13, fontWeight: 500, marginBottom: 6 }}>提供方 <span style={{ color: 'var(--error)' }}>*</span></label>
            <select style={{ width: '100%', padding: '10px 14px', border: '1px solid var(--border)', borderRadius: 'var(--radius-sm)', fontSize: 14, fontFamily: 'inherit', outline: 'none', background: 'var(--bg-card)' }}>
              <option>OpenAI</option>
              <option>Anthropic</option>
              <option>DeepSeek</option>
              <option>其他</option>
            </select>
          </div>
          <div>
            <label style={{ display: 'block', fontSize: 13, fontWeight: 500, marginBottom: 6 }}>API Key <span style={{ color: 'var(--error)' }}>*</span></label>
            <input type="password" style={{ width: '100%', padding: '10px 14px', border: '1px solid var(--border)', borderRadius: 'var(--radius-sm)', fontSize: 14, fontFamily: 'var(--font-mono)', outline: 'none' }} placeholder="sk-..." />
          </div>
          <div>
            <label style={{ display: 'block', fontSize: 13, fontWeight: 500, marginBottom: 6 }}>API Base URL（可选）</label>
            <input style={{ width: '100%', padding: '10px 14px', border: '1px solid var(--border)', borderRadius: 'var(--radius-sm)', fontSize: 14, fontFamily: 'var(--font-mono)', outline: 'none' }} placeholder="https://api.openai.com/v1" />
          </div>
          <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 10, marginTop: 8 }}>
            <Button variant="secondary" onClick={() => setAddModal(false)}>取消</Button>
            <Button>添加模型</Button>
          </div>
        </div>
      </Modal>
    </div>
  );
}

// ─── App Shell ───────────────────────────────────────────────

function App() {
  const [page, setPage] = useState('dashboard');

  const pages = {
    dashboard: <PageDashboard onNavigate={setPage} />,
    intents: <PageIntents />,
    versions: <PageVersions />,
    testsets: <PageTestSets />,
    experiments: <PageExperiments />,
    results: <PageResults />,
    evaluators: <PageEvaluators />,
    debug: <PageDebug />,
    visualization: <PageVisualization />,
    models: <PageModels />,
  };

  return (
    <div style={{ display: 'flex', height: '100vh', overflow: 'hidden' }}>
      <Sidebar currentPage={page} onNavigate={setPage} />
      <main style={{ flex: 1, overflow: 'auto', padding: '32px 40px' }}>
        {pages[page] || <EmptyState text="页面建设中..." />}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
